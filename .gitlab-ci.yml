stages:
  - build

build_develop:
  stage: build
  tags:
    - javafx
  script:
    - git clone -b feature/project_four https://oauth2:$CI_JOB_TOKEN@gitlab.com/projeto-de-integracao2/backend-integracao.git

    # Builda o backend
    - cd backend-integracao
    - mvn clean install
    - cd ..

    # Builda o front
    - mvn clean install

  only:
    - feature/project_four

  artifacts:
    paths:
      - target/jfx/native/*.exe